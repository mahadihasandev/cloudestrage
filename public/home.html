<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Cloud Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center">
                    <svg class="h-8 w-8 text-blue-600 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/>
                    </svg>
                    <span class="text-xl font-bold text-gray-900">CloudStorage</span>
                </div>
                <div class="flex items-center gap-4">
                    <span id="welcome-message" class="text-sm font-medium text-gray-700 hidden sm:block"></span>
                    <button id="logout-btn" class="text-sm text-gray-500 hover:text-gray-900 font-medium px-3 py-2 rounded-md transition-colors hover:bg-gray-100">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-8">
        
        <!-- Dashboard Header -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Your Dashboard</h1>
                <p class="text-sm text-gray-500 mt-1">Manage your files and monitor storage usage.</p>
            </div>
            <button onclick="document.getElementById('file-input').click()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg text-sm font-medium transition-colors shadow-sm flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                </svg>
                Upload File
            </button>
            <input type="file" id="file-input" class="hidden" onchange="handleFileUpload(event)">
        </div>

        <div id="upload-status" class="hidden rounded-md p-4 mb-4 text-sm font-medium"></div>

        <!-- Storage Summary Widget -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center gap-4">
                <div class="bg-blue-50 p-3 rounded-lg text-blue-600">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" />
                    </svg>
                </div>
                <div>
                    <p class="text-sm font-medium text-gray-500">Storage Used</p>
                    <p class="text-2xl font-bold text-gray-900" id="storage-used">Loading...</p>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center gap-4">
                <div class="bg-green-50 p-3 rounded-lg text-green-600">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <div>
                    <p class="text-sm font-medium text-gray-500">Storage Remaining</p>
                    <p class="text-2xl font-bold text-gray-900" id="storage-remaining">Loading...</p>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center gap-4">
                <div class="bg-purple-50 p-3 rounded-lg text-purple-600">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                    </svg>
                </div>
                <div>
                    <p class="text-sm font-medium text-gray-500">Active Files</p>
                    <p class="text-2xl font-bold text-gray-900" id="active-files-count">Loading...</p>
                </div>
            </div>
        </div>

        <!-- Files List -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="px-6 py-5 border-b border-gray-100">
                <h3 class="text-lg font-semibold text-gray-900">Your Files</h3>
            </div>
            
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">File Name</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Size</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Uploaded Date</th>
                            <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200" id="files-list">
                        <tr>
                            <td colspan="4" class="px-6 py-8 text-center text-sm text-gray-500">
                                Loading your files...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // -- 1. Authentication Check & Setup --
        const userStr = localStorage.getItem('user');
        if (!userStr) {
            window.location.href = '/login.html';
        }
        const user = JSON.parse(userStr);
        
        document.getElementById('welcome-message').innerText = `Hello, ${user.username}`;

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('user');
            window.location.href = '/login.html';
        });

        // -- 2. Formatting Utilities --
        function formatBytes(bytes, decimals = 2) {
            if (!+bytes) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB', 'PB', 'EB', 'ZB', 'YB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        }

        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            return new Date(dateString).toLocaleDateString(undefined, options);
        }

        // -- 3. API Calls --
        async function fetchStorageSummary() {
            try {
                const response = await fetch(`/users/${user.id}/storage-summary`);
                if (!response.ok) throw new Error('Failed to fetch summary');
                const data = await response.json();
                
                document.getElementById('storage-used').innerText = formatBytes(data.used_bytes);
                document.getElementById('storage-remaining').innerText = formatBytes(data.remaining_bytes);
                document.getElementById('active-files-count').innerText = data.active_file_count;
            } catch (error) {
                console.error('Error fetching summary:', error);
            }
        }

        async function fetchFiles() {
            try {
                const response = await fetch(`/users/${user.id}/files`);
                if (!response.ok) throw new Error('Failed to fetch files');
                const files = await response.json();
                
                const tableBody = document.getElementById('files-list');
                tableBody.innerHTML = '';

                if (files.length === 0) {
                    tableBody.innerHTML = `
                        <tr>
                            <td colspan="4" class="px-6 py-8 text-center text-sm text-gray-500">
                                No files uploaded yet. Click "Upload File" to get started.
                            </td>
                        </tr>
                    `;
                    return;
                }

                files.forEach(file => {
                    const row = document.createElement('tr');
                    row.className = 'hover:bg-gray-50 transition-colors';
                    row.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center">
                                <svg class="w-5 h-5 text-gray-400 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                                </svg>
                                <span class="text-sm font-medium text-gray-900">${file.file_name}</span>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            ${formatBytes(file.file_size_bytes)}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            ${formatDate(file.created_at)}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <button onclick="deleteFile(${file.id})" class="text-red-600 hover:text-red-900 hover:bg-red-50 px-3 py-1.5 rounded transition-colors">
                                Delete
                            </button>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error('Error fetching files:', error);
                document.getElementById('files-list').innerHTML = `
                    <tr>
                        <td colspan="4" class="px-6 py-8 text-center text-sm text-red-500">
                            Failed to load files. Please refresh the page.
                        </td>
                    </tr>
                `;
            }
        }

        async function deleteFile(fileId) {
            if (!confirm('Are you sure you want to delete this file?')) return;

            try {
                const response = await fetch(`/users/${user.id}/files/${fileId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'Failed to delete file');
                }

                showNotification('File deleted successfully', 'success');
                refreshDashboard();
            } catch (error) {
                console.error('Error deleting file:', error);
                showNotification(error.message, 'error');
            }
        }

        // Basic client-side hash generator for demo purposes
        async function generateHash(file) {
            const arrayBuffer = await file.arrayBuffer();
            const hashBuffer = await crypto.subtle.digest('SHA-256', arrayBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Reset input so the same file can be selected again if needed
            event.target.value = '';

            try {
                showNotification(`Uploading ${file.name}...`, 'info');
                
                const file_hash = await generateHash(file);
                
                const payload = {
                    file_name: file.name,
                    file_size_bytes: file.size,
                    file_hash: file_hash
                };

                const response = await fetch(`/users/${user.id}/files`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.message || 'Upload failed');
                }

                showNotification('File uploaded successfully', 'success');
                refreshDashboard();
            } catch (error) {
                console.error('Error uploading file:', error);
                showNotification(error.message, 'error');
            }
        }

        function showNotification(message, type) {
            const statusDiv = document.getElementById('upload-status');
            statusDiv.textContent = message;
            statusDiv.className = 'rounded-md p-4 mb-4 text-sm font-medium block';
            
            if (type === 'success') {
                statusDiv.classList.add('bg-green-50', 'text-green-800', 'border', 'border-green-200');
            } else if (type === 'error') {
                statusDiv.classList.add('bg-red-50', 'text-red-800', 'border', 'border-red-200');
            } else {
                statusDiv.classList.add('bg-blue-50', 'text-blue-800', 'border', 'border-blue-200');
            }

            setTimeout(() => {
                statusDiv.classList.add('hidden');
                statusDiv.className = 'hidden'; // reset
            }, 5000);
        }

        function refreshDashboard() {
            fetchStorageSummary();
            fetchFiles();
        }

        // -- 4. Initialization --
        refreshDashboard();
    </script>
</body>
</html>
