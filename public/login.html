<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Cloud Storage</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen relative overflow-hidden">
  <!-- Gradient Backgrounds for premium feel -->
  <div class="absolute top-[-10%] right-[-5%] w-[40%] h-[40%] bg-blue-400 rounded-full mix-blend-multiply filter blur-[100px] opacity-20 animate-blob"></div>
  <div class="absolute bottom-[-10%] left-[-5%] w-[40%] h-[40%] bg-purple-400 rounded-full mix-blend-multiply filter blur-[100px] opacity-20 animate-blob animation-delay-2000"></div>

  <div class="bg-white/80 backdrop-blur-xl p-8 rounded-2xl shadow-xl border border-white/20 w-full max-w-md relative z-10 transition-all hover:shadow-2xl hover:-translate-y-1 duration-300">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-gradient-to-br from-blue-500 to-indigo-600 text-white rounded-2xl mb-5 shadow-lg shadow-blue-500/30">
        <svg class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" />
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Welcome Back</h1>
      <p class="text-gray-500 mt-2 font-medium">Sign in to your Cloud Storage</p>
    </div>

    <div id="error-message" class="hidden mb-5 p-4 bg-red-50/80 backdrop-blur-sm border border-red-100 text-red-700 rounded-xl text-sm text-center font-medium shadow-sm transition-all"></div>

    <form id="login-form" class="space-y-6">
      <div class="space-y-1.5">
        <label class="block text-sm font-semibold text-gray-700 ml-1">Email</label>
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-blue-500 transition-colors">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
            </svg>
          </div>
          <input name="email" type="email" required autocomplete="username" 
            class="w-full pl-11 pr-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all duration-200 shadow-sm" 
            placeholder="you@example.com" />
        </div>
      </div>

      <div class="space-y-1.5">
        <label class="block text-sm font-semibold text-gray-700 ml-1">Password</label>
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-blue-500 transition-colors">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
          </div>
          <input name="password" type="password" required autocomplete="current-password" 
            class="w-full pl-11 pr-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all duration-200 shadow-sm" 
            placeholder="••••••••" />
        </div>
      </div>

      <button type="submit" 
        class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 active:scale-[0.98] text-white font-semibold py-3.5 rounded-xl transition-all duration-200 shadow-lg shadow-blue-500/25 hover:shadow-xl hover:shadow-blue-500/40 flex justify-center items-center gap-2 group">
        <span>Sign In</span>
        <svg class="w-4 h-4 translate-x-0 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
        </svg>
      </button>
    </form>

    <p class="mt-8 text-center text-sm text-gray-600">
      Need an account? <a href="/register.html" class="text-blue-600 hover:text-indigo-600 font-bold transition-colors hover:underline underline-offset-4 decoration-2">Create one now</a>
    </p>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const errorDiv = document.getElementById('error-message');
      const submitBtn = form.querySelector('button[type="submit"]');
      const btnSpan = submitBtn.querySelector('span');
      
      errorDiv.classList.add('hidden');
      submitBtn.disabled = true;
      btnSpan.textContent = 'Signing in...';
      submitBtn.classList.add('opacity-80', 'cursor-not-allowed');

      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());

      try {
        const response = await fetch('/users/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok) {
          // Save user data to localStorage
          localStorage.setItem('user', JSON.stringify(result));
          // Redirect to dashboard
          window.location.href = '/home.html';
        } else {
          throw new Error(result.message || 'Login failed');
        }
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        btnSpan.textContent = 'Sign In';
        submitBtn.classList.remove('opacity-80', 'cursor-not-allowed');
      }
    });
  </script>
</body>
</html>
