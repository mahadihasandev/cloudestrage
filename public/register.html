<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 520px; margin: 2rem auto; padding: 1rem; }
    label { display: block; margin-top: 1rem; }
    input { width: 100%; padding: 0.5rem; margin-top: 0.25rem; }
    button { margin-top: 1rem; padding: 0.6rem 1.2rem; }
    pre { background: #f5f5f5; padding: 1rem; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>Register</h1>
  <form id="register" action="/users/register" method="post">
    <label>
      Username
      <input name="username" required autocomplete="username" />
    </label>

    <label>
      Email
      <input name="email" type="email" required autocomplete="email" />
    </label>

    <label>
      Password
      <input name="password" type="password" required autocomplete="new-password" />
    </label>

    <button type="submit">Register</button>
  </form>

  <p>
    Already registered? <a href="/login.html">Login</a>
  </p>

  <p>
    After submitting, check your browser's developer tools Network tab for the JSON response.
  </p>
</body>
</html>
